services:
  micro-notify:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: micro-notify
    restart: unless-stopped
    env_file:
      - .env
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      DATABASE_URL: postgresql://${POSTGRES_USER:-notify}:${POSTGRES_PASSWORD:-notify}@postgres:5432/${POSTGRES_DB:-notifyhub}
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - whatsapp-auth:/app/data/baileys-auth
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - notify-net

  redis:
    image: redis:7-alpine
    container_name: notify-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "16379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - notify-net

  postgres:
    image: postgres:16-alpine
    container_name: notify-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-notify}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-notify}
      POSTGRES_DB: ${POSTGRES_DB:-notifyhub}
    ports:
      - "15432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-notify} -d ${POSTGRES_DB:-notifyhub}"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - notify-net

volumes:
  whatsapp-auth:
  redis-data:
  postgres-data:

networks:
  notify-net:
    driver: bridge
